<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeFactory - Industrial Terminal Complex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stencil+One&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm@5/css/xterm.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/industrial-prose.css">
</head>
<body>

<!-- Elevator navigation panel (fixed right side) -->
<nav class="elevator-panel" aria-label="Floor navigation">
    <div class="panel-frame">
        <div class="panel-indicator" id="panelIndicator">L</div>
        <div class="panel-arrow" id="panelArrow">&#9650;</div>
        <div id="elevator-buttons">
            <!-- Dynamically generated floor buttons -->
        </div>
        <button class="floor-btn active" data-target="lobby" data-label="Lobby">L</button>
    </div>
</nav>

<!-- Main shaft content (top of page = top of building) -->
<main class="shaft">

    <!-- Dynamic floors injected here by JS -->
    <div id="floors-container"></div>

    <!-- LOBBY (bottom of page = ground floor) -->
    <section class="floor" id="lobby">
        <div class="elevator-doors">
            <div class="door door-left"></div>
            <div class="door door-right"></div>
        </div>
        <div class="lobby-content">
            <h1 class="lobby-title">CODEFACTORY</h1>
            <h2 class="lobby-subtitle">INDUSTRIAL TERMINAL COMPLEX</h2>
            <div class="lobby-status">
                <span class="status-indicator"></span>
                <span class="status-text">SYSTEM OPERATIONAL</span>
            </div>
            <p class="lobby-desc">
                A vertical complex of networked terminal bays. Each floor houses an
                isolated shell environment accessible through the elevator system.
                Navigate using the control panel or scroll to ascend through the facility.
            </p>
            <div class="lobby-ascend">
                <span class="ascend-arrow">&#9650;</span>
                <span class="ascend-text">ASCEND TO BEGIN</span>
            </div>
        </div>
    </section>

</main>

<script src="https://unpkg.com/@xterm/xterm@5/lib/xterm.js"></script>
<script src="https://unpkg.com/@xterm/addon-fit@0/lib/addon-fit.js"></script>
<script src="https://unpkg.com/@xterm/addon-web-links@0/lib/addon-web-links.js"></script>
<script src="https://unpkg.com/@xterm/addon-canvas@0/lib/addon-canvas.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<script src="js/terminal.js"></script>
<script src="js/markdown-panel.js"></script>
<script src="js/app.js"></script>
</body>
</html>
