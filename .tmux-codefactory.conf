# CodeFactory tmux configuration
# Optimized for xterm.js terminal rendering

# Responsiveness
set -sg escape-time 0
set -g history-limit 10000
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-256color:RGB"

# Sizing - let xterm.js control
set -g aggressive-resize off

# Exit behavior
set -g remain-on-exit off

# Input/output
set -g mouse on
set -g xterm-keys on

# Status bar - minimal for embedded use
set -g status off

# Window management
set -g allow-rename off
set -g automatic-rename off
